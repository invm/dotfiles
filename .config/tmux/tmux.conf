# unbind l
unbind C-b
set-option -g prefix C-q
bind-key C-q send-prefix

# select windows
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6

# toggle previous window (like `cd -` / `gco -`)
bind-key -n M-Tab last-window
# toggle previous session
bind-key -n M-` switch-client -l

bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded..."

# pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @continuum-restore 'on'

set -g extended-keys always
set -as terminal-features 'xterm*:extkeys'

run '~/.tmux/plugins/tpm/tpm'
run ~/.config/tmux/plugins/tmux/catppuccin.tmux

# -- display -------------------------------------------------------------------
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_default_text " #W" # use "#W" for application instead of directory
set -g @catppuccin_window_current_text " #W" # use "#W" for application instead of directory
set -g @catppuccin_status_modules_right "session date_time"
set -g @catppuccin_window_status_style "rounded"
# Make the status line pretty and add some modules
set -g status-right-length 0
set -g status-left-length 0
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set-option -sa terminal-overrides ",xterm*:Tc"
# Customize the right part if needed
set -g status-right '%H:%M %d-%b-%Y'
# Exit-status-aware tab colors (driven by zsh hooks in tmux-status.sh).
# @status values: idle | running | done_ok | done_err (mocha palette).
set -g @status_ok_bg   "#a6e3a1"
set -g @status_err_bg  "#f38ba8"
set -g @status_idle_bg "#45475a"
set -g @status_idle_fg "#cdd6f4"
set -g @status_done_fg "#11111b"
set -g @win_bg "#{?#{==:#{E:@status},done_ok},#{@status_ok_bg},#{?#{==:#{E:@status},done_err},#{@status_err_bg},#{@status_idle_bg}}}"
set -g @win_fg "#{?#{==:#{E:@status},done_ok},#{@status_done_fg},#{?#{==:#{E:@status},done_err},#{@status_done_fg},#{@status_idle_fg}}}"

# Inactive window style (show only app name)
set -g window-status-format "#[bg=#{E:@win_bg},fg=#{E:@win_fg}] #I #W "

# Clear @status when user focuses the window (alert dismissed).
set-hook -g after-select-window 'set-window-option @status idle'
# set vi-mode
set-window-option -g mode-keys vi
# # Use vim keybindings in copy mode
setw -g mode-keys vi
set -g base-index 1           # start windows numbering at 1
setw -g pane-base-index 1     # make pane numbering consistent with windows
set-window-option -g pane-base-index 1
setw -g automatic-rename on   # rename window to reflect current program
set -g renumber-windows on    # renumber windows when a window is closed
set -g set-titles on          # set terminal title
set -g display-panes-time 800 # slightly longer pane indicators display time
# clear both screen and history
# bind -n C-l send-keys C-l \; run 'sleep 0.01' \; clear-history
# bind C-l send-keys 'C-l'
# activity
set -g monitor-activity on
set -g visual-activity off

# create session
bind C-c new-session
# split current window horizontally
bind - split-window -v -c "#{pane_current_path}"
# split current window vertically
bind q split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
# new window same path
bind c new-window -c "#{pane_current_path}"

# System setup
if 'infocmp -x tmux-256color > /dev/null 2>&1' 'set -g default-terminal "tmux-256color"'

setw -g xterm-keys on
set -sg repeat-time 600                   # increase repeat timeout
set -g focus-events on                    # let vim etc. see pane focus in/out
set -g history-limit 50000                # bigger scrollback
set -g display-time 2000                  # keep status messages readable

# scroll with mouse
setw -g mouse on


# copy and paste with mouse
set -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M
bind -n C-WheelUpPane select-pane -t= \; copy-mode -e \; send-keys -M
bind -T copy-mode-vi    C-WheelUpPane   send-keys -X halfpage-up
bind -T copy-mode-vi    C-WheelDownPane send-keys -X halfpage-down
bind -T copy-mode-emacs C-WheelUpPane   send-keys -X halfpage-up
bind -T copy-mode-emacs C-WheelDownPane send-keys -X halfpage-down

# copy keybindings
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind P paste-buffer
# portable clipboard command (used by copy-pipe when no arg given)
if 'command -v pbcopy'  'set -g copy-command "pbcopy"'
if 'command -v wl-copy' 'set -g copy-command "wl-copy"'
if 'command -v xclip'   'set -g copy-command "xclip -selection clipboard -i"'
# C-k: select to end of line and copy (tmux-yank handles y/Enter/mouse)
bind -T copy-mode-vi C-k send -X begin-selection \; send -X end-of-line \; send -X copy-pipe-and-cancel

# swap windows
bind-key -n S-Left swap-window -t -1\; select-window -t -1
bind-key -n S-Right swap-window -t +1\; select-window -t +1
